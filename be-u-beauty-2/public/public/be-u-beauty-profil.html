<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be U Beauty — Profil beállítás</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  html { background: #0f0e0c !important; color-scheme: dark; }
:root {
  --bg: #0f0e0c;
  --bg2: #161411;
  --bg3: #1d1a15;
  --gold: #c9a96e;
  --gold2: #e8c98a;
  --cream: #f0e8d5;
  --muted: #6b6558;
  --border: rgba(201,169,110,0.15);
  --border2: rgba(201,169,110,0.35);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { color-scheme: dark;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--cream);
  min-height: 100vh;
}

/* TOP */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 0.5px solid var(--border);
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  color: var(--gold);
}
.step-indicator {
  font-size: 12px;
  color: var(--muted);
}
.step-indicator span { color: var(--gold); font-weight: 500; }

/* PROGRESS */
.progress-bar {
  height: 2px;
  background: var(--border);
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #c9a030, #e8c070);
  transition: width 0.4s ease;
}

/* MAIN */
.main {
  max-width: 520px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* STEP HEADER */
.step-header { margin-bottom: 32px; }
.step-num {
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
}
.step-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px, 5vw, 32px);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 8px;
}
.step-title em { font-style: italic; color: var(--gold); }
.step-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

/* FIELDS */
.field { margin-bottom: 20px; }
label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--gold2);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.hint { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.5; }
input, textarea, select {
  width: 100%;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--cream);
  outline: none;
  transition: border-color .2s;
  resize: vertical;
}
input:focus, textarea:focus, select:focus { border-color: var(--border2); }
input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.7; }
select option { background: #1d1a15; }

/* CHIP SELECT */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}
.chip:hover { border-color: var(--border2); color: var(--cream); }
.chip.active {
  background: rgba(201,169,110,0.1);
  border-color: var(--gold);
  color: var(--gold2);
}

/* SCALE */
.scale-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}
.scale-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
input[type=range] {
  flex: 1;
  padding: 0;
  background: none;
  border: none;
  height: 4px;
  accent-color: var(--gold);
}

/* NAV */
.nav {
  display: flex;
  gap: 10px;
  margin-top: 36px;
}
.btn-back {
  flex: 1;
  background: none;
  border: 0.5px solid var(--border);
  border-radius: 50px;
  padding: 14px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
}
.btn-back:hover { border-color: var(--border2); color: var(--cream); }
.btn-next {
  flex: 2;
  background: linear-gradient(135deg, #c9a030, #e8c070);
  border: none;
  border-radius: 50px;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  color: #1a1000;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
}
.btn-next:hover { opacity: 0.9; transform: scale(1.01); }

/* SUMMARY */
.summary-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
}
.summary-section-title {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
}
.summary-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 13px;
}
.summary-row:last-child { margin-bottom: 0; }
.s-label { color: var(--muted); min-width: 100px; flex-shrink: 0; }
.s-val { color: var(--cream); line-height: 1.5; }

/* DONE */
.done-screen { text-align: center; padding: 20px 0; }
.done-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: rgba(201,169,110,0.1);
  border: 0.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin: 0 auto 24px;
}
.done-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  margin-bottom: 12px;
}
.done-title em { font-style: italic; color: var(--gold); }
.done-sub { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
.action-btn {
  display: block;
  width: 100%;
  background: linear-gradient(135deg, #c9a030, #e8c070);
  border: none;
  border-radius: 50px;
  padding: 16px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  color: #1a1000;
  cursor: pointer;
  margin-bottom: 10px;
  transition: opacity .2s;
}
.action-btn:hover { opacity: 0.9; }
.action-btn.sec {
  background: none;
  border: 0.5px solid var(--border2);
  color: var(--muted);
  font-weight: 400;
}
.action-btn.sec:hover { color: var(--cream); }

@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.step-content { animation: fadeIn 0.35s ease both; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Be U Beauty</div>
  <div class="step-indicator">Lépés <span id="stepNum">1</span> / 5</div>
</div>
<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width:20%"></div>
</div>

<div class="main">
  <div id="stepContent"></div>
</div>

<script>
const profile = {
  nev: '', szakma: [], megye: '',
  szolgaltatasok: '', kiemelt: '', ar_szint: 3,
  ideal_vendeg: '', nemszeretne: '',
  hang: '', tilos: '', stilus: 3,
  cel_rovid: '', cel_hosszu: ''
};

const steps = [
  {
    title: 'Ki vagy <em>te?</em>',
    sub: 'Az alapok — ez határozza meg az összes többi lépést.',
    num: '1. lépés — Személyes alap',
    fields: () => `
      <div class="field">
        <label>Neved / Szalonod neve</label>
        <input type="text" id="nev" placeholder="pl. Kata, vagy Be U Beauty" value="${profile.nev}">
      </div>
      <div class="field">
        <label>Szakmád</label>
        <div class="hint">Több is lehet.</div>
        <div class="chips" id="szakmaChips">
          ${['Körmös','Fodrász','Sminkes','Kozmetikus','Lash artist','Brow artist','Masszőr','Komplex szalon'].map(s =>
            `<div class="chip${profile.szakma.includes(s)?' active':''}" onclick="toggleChip(this,'szakma','${s}')">${s}</div>`
          ).join('')}
        </div>
      </div>
      <div class="field">
        <label>Hol dolgozol?</label>
        <input type="text" id="megye" placeholder="pl. Budapest, Győr, Pécs..." value="${profile.megye}">
      </div>
    `
  },
  {
    title: 'Mit <em>kínálsz?</em>',
    sub: 'Szolgáltatásaid és az árazásod szintje — ez határozza meg a vendégedet.',
    num: '2. lépés — Szolgáltatás dizájn',
    fields: () => `
      <div class="field">
        <label>Szolgáltatásaid</label>
        <div class="hint">Hogyan nevezed el őket? Ne csak "géllakk" — hanem ahogy te hívod.</div>
        <textarea id="szolgaltatasok" rows="3" placeholder="pl. Hosszantartó köröm, Balayage természetes hatással, Reggeli arckezelés...">${profile.szolgaltatasok}</textarea>
      </div>
      <div class="field">
        <label>Mi a kiemelt szolgáltatásod?</label>
        <div class="hint">Amiben a legjobb vagy, amire büszke vagy, ami megkülönböztet.</div>
        <textarea id="kiemelt" rows="2" placeholder="pl. Természetes hatású hosszabbítás, amit napokig nem kell félteni">${profile.kiemelt}</textarea>
      </div>
      <div class="field">
        <label>Árazás szintje</label>
        <div class="scale-row">
          <span class="scale-label">Elérhető</span>
          <input type="range" id="ar_szint" min="1" max="5" value="${profile.ar_szint}" oninput="updateScale(this,'arLabel')">
          <span class="scale-label">Prémium</span>
        </div>
        <div style="text-align:center;font-size:12px;color:var(--gold);margin-top:6px;" id="arLabel">${getArLabel(profile.ar_szint)}</div>
      </div>
    `
  },
  {
    title: 'Kinek <em>szólsz?</em>',
    sub: 'Az ideális vendéged — nem korcsoport, hanem milyen ember.',
    num: '3. lépés — Ideális vendég',
    fields: () => `
      <div class="field">
        <label>Az ideális vendéged</label>
        <div class="hint">Milyen ember? Mit értékel? Hogyan gondolkozik? Mit keres nálad?</div>
        <textarea id="ideal_vendeg" rows="4" placeholder="pl. Dolgozó nő 30-45 között, aki megbecsüli a munkát, nem az árat nézi először. Visszajár, ajánl másoknak. Nem alkudozik, de elvárja a minőséget.">${profile.ideal_vendeg}</textarea>
      </div>
      <div class="field">
        <label>Kit NEM szeretnél vendégként?</label>
        <div class="hint">Fontos! Ez segít elkerülni a rossz vendéget a kommunikációban.</div>
        <textarea id="nemszeretne" rows="3" placeholder="pl. Aki mindig az akciót keresi, csak az ár alapján dönt, nem tartja be az időpontot.">${profile.nemszeretne}</textarea>
      </div>
    `
  },
  {
    title: 'A te <em>hangod</em>',
    sub: 'Hogyan szólsz — ez különböztet meg mindenki mástól.',
    num: '4. lépés — Kommunikációs stílus',
    fields: () => `
      <div class="field">
        <label>A te hangod, stílusod</label>
        <div class="hint">Hogyan beszélsz a vendégeiddel? Mi jellemző rád? Adj példát ha tudsz.</div>
        <textarea id="hang" rows="3" placeholder="pl. Meleg, nyugodt, nem kapkodó. Szeretek mesélni. Természetes, nem reklámszerű. Tegezem a vendégeimet.">${profile.hang}</textarea>
      </div>
      <div class="field">
        <label>Mit soha nem írnál / mondanál?</label>
        <div class="hint">Ezeket az asszisztens soha nem fogja használni.</div>
        <textarea id="tilos" rows="2" placeholder="pl. 'Foglalj most!', felkiáltójelek, 'ne hagyd ki', 'hihetetlen ajánlat'">${profile.tilos}</textarea>
      </div>
      <div class="field">
        <label>Kommunikációs stílus</label>
        <div class="scale-row">
          <span class="scale-label">Visszafogott</span>
          <input type="range" id="stilus" min="1" max="5" value="${profile.stilus}" oninput="updateScale(this,'stilusLabel')">
          <span class="scale-label">Nyílt, személyes</span>
        </div>
        <div style="text-align:center;font-size:12px;color:var(--gold);margin-top:6px;" id="stilusLabel">${getStilusLabel(profile.stilus)}</div>
      </div>
    `
  },
  {
    title: 'A céljaid',
    sub: 'Mit szeretnél elérni — ez határozza meg a tartalmaid irányát.',
    num: '5. lépés — Célok',
    fields: () => `
      <div class="field">
        <label>Rövid távú cél (1-3 hónap)</label>
        <div class="chips" id="celChips">
          ${['Több foglalás','Visszajáró vendégek','Prémium vendégkör','Új vendégek','Követők növelése','Áremelés előkészítése'].map(s =>
            `<div class="chip${profile.cel_rovid===s?' active':''}" onclick="selectOne(this,'cel_rovid','${s}')">${s}</div>`
          ).join('')}
        </div>
      </div>
      <div class="field" style="margin-top:20px;">
        <label>Hosszú távú álom (1 év múlva)</label>
        <div class="hint">Mire használnád a Be U Beauty Method-ot hosszú távon?</div>
        <textarea id="cel_hosszu" rows="3" placeholder="pl. Tele legyen a naptáram jó vendégekkel, ne kelljen akciózni, és legyen időm a saját életemet is élni.">${profile.cel_hosszu}</textarea>
      </div>
    `
  }
];

let currentStep = 0;

function getArLabel(v) {
  return ['','Nagyon elérhető árak','Középáras','Közepes-prémium','Prémium','Luxus / exkluzív'][v];
}
function getStilusLabel(v) {
  return ['','Nagyon visszafogott','Visszafogott','Kiegyensúlyozott','Nyílt és személyes','Nagyon személyes, intim hangú'][v];
}
function updateScale(el, labelId) {
  const v = parseInt(el.value);
  if(labelId==='arLabel') document.getElementById('arLabel').textContent = getArLabel(v);
  if(labelId==='stilusLabel') document.getElementById('stilusLabel').textContent = getStilusLabel(v);
}

function toggleChip(el, field, val) {
  el.classList.toggle('active');
  if(!Array.isArray(profile[field])) profile[field] = [];
  if(profile[field].includes(val)) profile[field] = profile[field].filter(x=>x!==val);
  else profile[field].push(val);
}

function selectOne(el, field, val) {
  document.querySelectorAll('#celChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  profile[field] = val;
}

function saveCurrentStep() {
  const s = steps[currentStep];
  if(currentStep===0) {
    profile.nev = document.getElementById('nev')?.value || profile.nev;
    profile.megye = document.getElementById('megye')?.value || profile.megye;
  } else if(currentStep===1) {
    profile.szolgaltatasok = document.getElementById('szolgaltatasok')?.value || profile.szolgaltatasok;
    profile.kiemelt = document.getElementById('kiemelt')?.value || profile.kiemelt;
    profile.ar_szint = parseInt(document.getElementById('ar_szint')?.value) || profile.ar_szint;
  } else if(currentStep===2) {
    profile.ideal_vendeg = document.getElementById('ideal_vendeg')?.value || profile.ideal_vendeg;
    profile.nemszeretne = document.getElementById('nemszeretne')?.value || profile.nemszeretne;
  } else if(currentStep===3) {
    profile.hang = document.getElementById('hang')?.value || profile.hang;
    profile.tilos = document.getElementById('tilos')?.value || profile.tilos;
    profile.stilus = parseInt(document.getElementById('stilus')?.value) || profile.stilus;
  } else if(currentStep===4) {
    profile.cel_hosszu = document.getElementById('cel_hosszu')?.value || profile.cel_hosszu;
  }
}

function next() {
  saveCurrentStep();
  if(currentStep < steps.length - 1) {
    currentStep++;
    render();
  } else {
    showSummary();
  }
}

function back() {
  saveCurrentStep();
  if(currentStep > 0) { currentStep--; render(); }
}

function render() {
  const s = steps[currentStep];
  const pct = ((currentStep+1)/steps.length)*100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('stepNum').textContent = currentStep+1;

  document.getElementById('stepContent').innerHTML = `
    <div class="step-content">
      <div class="step-header">
        <div class="step-num">${s.num}</div>
        <div class="step-title">${s.title}</div>
        <div class="step-sub">${s.sub}</div>
      </div>
      ${s.fields()}
      <div class="nav">
        ${currentStep > 0 ? '<button class="btn-back" onclick="back()">← Vissza</button>' : ''}
        <button class="btn-next" onclick="next()">${currentStep < steps.length-1 ? 'Következő →' : 'Profil mentése →'}</button>
      </div>
    </div>
  `;

  if(currentStep===1) {
    const ar = document.getElementById('ar_szint');
    if(ar) ar.addEventListener('input', function(){ updateScale(this,'arLabel'); });
    const st = document.getElementById('stilus');
    if(st) st.addEventListener('input', function(){ updateScale(this,'stilusLabel'); });
  }
  if(currentStep===3) {
    const st = document.getElementById('stilus');
    if(st) st.addEventListener('input', function(){ updateScale(this,'stilusLabel'); });
  }
}

function showSummary() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('stepNum').textContent = '✓';

  document.getElementById('stepContent').innerHTML = `
    <div class="step-content">
      <div class="done-screen">
        <div class="done-icon">✨</div>
        <div class="done-title">Profil <em>kész!</em></div>
        <div class="done-sub">Az asszisztens mostantól a te hangodra, a te vendégeidre szabva dolgozik. Minden poszt ebből az alapból indul ki.</div>
      </div>

      <div class="summary-card">
        <div class="summary-section-title">Alap</div>
        <div class="summary-row"><span class="s-label">Név</span><span class="s-val">${profile.nev||'—'}</span></div>
        <div class="summary-row"><span class="s-label">Szakma</span><span class="s-val">${profile.szakma.join(', ')||'—'}</span></div>
        <div class="summary-row"><span class="s-label">Helyszín</span><span class="s-val">${profile.megye||'—'}</span></div>
      </div>

      <div class="summary-card">
        <div class="summary-section-title">Szolgáltatás</div>
        <div class="summary-row"><span class="s-label">Kínálat</span><span class="s-val">${profile.szolgaltatasok||'—'}</span></div>
        <div class="summary-row"><span class="s-label">Kiemelt</span><span class="s-val">${profile.kiemelt||'—'}</span></div>
        <div class="summary-row"><span class="s-label">Ár szint</span><span class="s-val">${getArLabel(profile.ar_szint)}</span></div>
      </div>

      <div class="summary-card">
        <div class="summary-section-title">Ideális vendég</div>
        <div class="summary-row"><span class="s-label">Kinek szólsz</span><span class="s-val">${profile.ideal_vendeg||'—'}</span></div>
        <div class="summary-row"><span class="s-label">Kit kerülsz</span><span class="s-val">${profile.nemszeretne||'—'}</span></div>
      </div>

      <div class="summary-card">
        <div class="summary-section-title">Kommunikáció</div>
        <div class="summary-row"><span class="s-label">Hang</span><span class="s-val">${profile.hang||'—'}</span></div>
        <div class="summary-row"><span class="s-label">Tilos</span><span class="s-val">${profile.tilos||'—'}</span></div>
        <div class="summary-row"><span class="s-label">Stílus</span><span class="s-val">${getStilusLabel(profile.stilus)}</span></div>
      </div>

      <div class="summary-card">
        <div class="summary-section-title">Célok</div>
        <div class="summary-row"><span class="s-label">Rövid táv</span><span class="s-val">${profile.cel_rovid||'—'}</span></div>
        <div class="summary-row"><span class="s-label">Hosszú táv</span><span class="s-val">${profile.cel_hosszu||'—'}</span></div>
      </div>

      <button class="action-btn" onclick="goToAssistant()">Megyek az asszisztenshez →</button>
      <button class="action-btn sec" onclick="currentStep=0;render()">← Szerkesztés</button>
    </div>
  `;
}

function goToAssistant() {
  localStorage.setItem('beautyProfile', JSON.stringify(profile));
  alert('Profil mentve! Az asszisztens már a te adataiddal dolgozik.');
}

render();
</script>
</body>
</html>
